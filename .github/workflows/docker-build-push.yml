name: Build and Push Docker images

on:
  workflow_dispatch:
  #push:
    #branches: [ "main" ]

jobs:

  build:
  
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
    - name: Build Service Docker image
      run: docker build --file "${{ github.workspace }}/Service/Dockerfile" --tag digiwells/norcedrillingearthmagneticfieldservice:stable .

    - name: Push Docker image for Service to DockerHub
      run: docker push digiwells/norcedrillingearthmagneticfieldservice:stable

    - name: Build WebApp Docker image
      run: docker build --file "${{ github.workspace }}/WebApp/Dockerfile" --tag digiwells/norcedrillingearthmagneticfieldwebappclient:stable .

    - name: Push Docker image for WebApp to DockerHub
      run: docker push digiwells/norcedrillingearthmagneticfieldwebappclient:stable
